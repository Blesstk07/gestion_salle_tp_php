<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Authentification biométrique</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#4b1d6b,#b48a00);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.box{
    background:white;
    color:#333;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
    color:#4b1d6b;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#4b1d6b,#b48a00);
    color:white;
    font-size:16px;
    cursor:pointer;
    width:100%;
}

button:hover{
    opacity:0.9;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Vérification biométrique</h2>

<p>Confirme ton identité avec ton empreinte digitale ou Face ID</p>

<button onclick="authenticate()">
Valider avec biométrie
</button>

</div>

<script>
async function authenticate() {
    try {
        // WebAuthn (biométrie système)
        const credential = await navigator.credentials.get({
            publicKey: {
                challenge: new Uint8Array([1,2,3,4]),
                allowCredentials: [],
                userVerification: "required",
                timeout: 60000
            }
        });

        // ✅ succès biométrique
        alert("✔ Authentification réussie");

        // redirection vers session finale PHP
        window.location.href = "success.php";

    } catch (err) {
        alert("❌ Authentification refusée ou annulée");
        console.log(err);
    }
}
</script>

</body>
</html>
