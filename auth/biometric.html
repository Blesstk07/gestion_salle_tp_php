<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biométrie</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4b1d6b,#b48a00);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    background:white;
    color:#4b1d6b;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Validation biométrique</h2>
    <p>Utilise empreinte ou Face ID</p>

    <button onclick="auth()">Activer</button>
</div>

<script>
async function auth(){
    try {
        const publicKey = {
            challenge: new Uint8Array(32),
            rp: { name: "SGA" },
            user: {
                id: new Uint8Array(16),
                name: "user",
                displayName: "SGA User"
            },
            pubKeyCredParams: [{ type: "public-key", alg: -7 }],
            authenticatorSelection: {
                authenticatorAttachment: "platform",
                userVerification: "required"
            }
        };

        await navigator.credentials.create({ publicKey });

        // ✅ IMPORTANT : retour dashboard ROOT
        window.location.href = "../index.php";

    } catch (e) {
        alert("Échec biométrie: " + e.message);
    }
}
</script>

</body>
</html>
